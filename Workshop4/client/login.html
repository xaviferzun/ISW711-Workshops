<!DOCTYPE html>
<html>
    <body>
        <h2>Login</h2>

        <input id="email" placeholder="Email">
        <input id="password" type="password" placeholder="Password">
        <button onclick="login()">Login</button>

        <script>
            //Función login
            async function login() {
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;

            //Pide al api el token de autenticación
            const res = await fetch("http://localhost:3000/auth/token", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ email, password })
            });

            const data = await res.json();

            //Si el login es exitoso guardo el token en localStorage y redirijo a la página de profesores
            if (data.token) {
                localStorage.setItem("token", data.token);
                window.location.href = "professors.html";
            } else {
                alert("Login inválido");
            }
            }
        </script>

    </body>
</html>
